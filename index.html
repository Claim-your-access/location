<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top left, #1e3c72, #2a5298);
    overflow:hidden;
    color:white;
}

/* Animated Background Glow */
.glow{
    position:absolute;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(0,255,255,0.4), transparent 70%);
    animation: float 6s infinite alternate ease-in-out;
    top:-150px;
    left:-150px;
}

.glow2{
    position:absolute;
    width:500px;
    height:500px;
    background: radial-gradient(circle, rgba(255,0,200,0.4), transparent 70%);
    animation: float 8s infinite alternate-reverse ease-in-out;
    bottom:-150px;
    right:-150px;
}

@keyframes float{
    from{ transform: translateY(0px); }
    to{ transform: translateY(50px); }
}

/* Glass Card */
.container{
    position:relative;
    z-index:2;
    width:380px;
    padding:50px 35px;
    border-radius:25px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    text-align:center;
    animation: fadeUp 1s ease;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-size:24px;
    font-weight:700;
    margin-bottom:30px;
    letter-spacing:1px;
}

/* Input Group */
.input-group{
    position:relative;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px 20px;
    border-radius:40px;
    border:none;
    outline:none;
    font-size:14px;
    background:rgba(255,255,255,0.15);
    color:white;
    transition:0.4s;
}

input::placeholder{
    color:#ddd;
}

input:focus{
    background:rgba(255,255,255,0.25);
    box-shadow:0 0 15px rgba(0,255,255,0.6);
    transform:scale(1.05);
}

/* Button */
button{
    width:100%;
    padding:14px;
    border-radius:40px;
    border:none;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    background:linear-gradient(45deg, #00f2fe, #4facfe);
    color:white;
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,255,255,0.5);
}

/* Ripple Effect */
button::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.2);
    top:0;
    left:-100%;
    transition:0.4s;
}

button:hover::after{
    left:100%;
}

/* Result Box */
#result{
    margin-top:25px;
    padding:18px;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    font-size:14px;
    min-height:50px;
    opacity:0;
    transform:translateY(20px);
    transition:0.5s ease;
}

#result.show{
    opacity:1;
    transform:translateY(0);
}

/* Loader */
.loader{
    border:3px solid rgba(255,255,255,0.3);
    border-top:3px solid white;
    border-radius:50%;
    width:20px;
    height:20px;
    margin:auto;
    animation: spin 1s linear infinite;
}

@keyframes spin{
    to{ transform: rotate(360deg); }
}

/* Responsive */
@media(max-width:450px){
    .container{
        width:90%;
        padding:40px 25px;
    }
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="container">
    <h1>🌍 Location Finder</h1>

    <div class="input-group">
        <input type="text" id="location" placeholder="Enter a city or place...">
    </div>

    <button id="getCoords">Get Coordinates</button>

    <div id="result"></div>
</div>


<script>
    // script.js

document.getElementById('getCoords').addEventListener('click', () => {
    const location = document.getElementById('location').value;
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(location)}&format=json&addressdetails=1`;

    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data.length > 0) {
                const location = data[0];
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `Latitude: ${location.lat}, Longitude: ${location.lon}`;
            } else {
                document.getElementById('result').innerText = 'Location not found.';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('result').innerText = 'An error occurred.';
        });
});
</script>
</body>
</html>
