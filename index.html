<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    overflow:hidden;
}

/* Floating background animation */
body::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background: radial-gradient(circle, rgba(0,255,255,0.4), transparent 70%);
    top:-100px;
    left:-100px;
    animation: float 6s ease-in-out infinite alternate;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background: radial-gradient(circle, rgba(255,0,255,0.4), transparent 70%);
    bottom:-100px;
    right:-100px;
    animation: float 8s ease-in-out infinite alternate-reverse;
}

@keyframes float{
    from{ transform: translateY(0px); }
    to{ transform: translateY(40px); }
}

/* Glass Card */
.container{
    position:relative;
    z-index:1;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding:50px 40px;
    border-radius:20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    text-align:center;
    width:350px;
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform: translateY(20px);}
    to{opacity:1; transform: translateY(0);}
}

h1{
    color:#fff;
    font-weight:600;
    margin-bottom:25px;
    letter-spacing:1px;
}

/* Input Field */
input{
    width:100%;
    padding:12px 15px;
    border-radius:30px;
    border:none;
    outline:none;
    font-size:14px;
    margin-bottom:15px;
    background:rgba(255,255,255,0.2);
    color:white;
    transition:0.3s;
}

input::placeholder{
    color:#ddd;
}

input:focus{
    background:rgba(255,255,255,0.3);
    transform:scale(1.05);
}

/* Button */
button{
    width:100%;
    padding:12px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    font-size:15px;
    font-weight:500;
    background:linear-gradient(45deg, #00c6ff, #0072ff);
    color:white;
    transition:0.4s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 5px 20px rgba(0,114,255,0.6);
}

/* Result Box */
#result{
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.15);
    color:#fff;
    font-size:14px;
    min-height:40px;
    transition:0.4s;
}

</style>
</head>

<body>

<div class="container">
    <h1>🌍 Location Finder</h1>
    <input type="text" id="location" placeholder="Enter a place..." />
    <button id="getCoords">Get Coordinates</button>
    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
